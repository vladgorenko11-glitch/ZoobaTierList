  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    color: #fff;
    font-family: 'Tobi', 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }

  h1 {
    text-align: center;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: 1px;
    margin-bottom: 6px;
    color: #ffffff;
  }

  .subtitle {
    text-align: center;
    color: #6db8f0;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .tier-table {
    width: 100%;
    max-width: 900px;
    margin: 0 auto 28px;
    border: 2px solid #333;
    border-radius: 6px;
    overflow: hidden;
  }

  .tier-row {
    display: flex;
    min-height: 80px;
    border-bottom: 2px solid #2c2c2c;
  }
  .tier-row:last-child { border-bottom: none; }

  .tier-label {
    width: 200px;
    min-width: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 1.35rem;
    letter-spacing: 1px;
    color: #1a1a1a;
    text-shadow: none;
    user-select: none;
    flex-shrink: 0;
    text-align: center;
    padding: 10px;
    line-height: 1.2;
  }

  .tier-S .tier-label { background: #e05252; color: #1a1a1a; }
  .tier-A .tier-label { background: linear-gradient(160deg, #e07832 0%, #e0a028 100%); color: #1a1a1a; }
  .tier-B .tier-label { background: #e0c832; color: #1a1a1a; }
  .tier-C .tier-label { background: #44c878; color: #1a1a1a; }
  .tier-D .tier-label { background: #48b8d0; color: #1a1a1a; }

  .tier-S { min-height: 90px; }
  .tier-A { min-height: 200px; }
  .tier-B { min-height: 120px; }
  .tier-C { min-height: 80px; }
  .tier-D { min-height: 80px; }

  .tier-content {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 6px;
    padding: 8px;
    background: #252525;
    min-height: inherit;
    transition: background 0.15s;
  }
  .tier-content.drag-over {
    background: #303030;
    outline: 2px dashed #666;
    outline-offset: -4px;
  }

    .drop-placeholder {
    width: 4px;
    height: 80px;
    background: #7c6fff;
    border-radius: 4px;
    flex-shrink: 0;
    pointer-events: none;
    box-shadow: 0 0 8px #7c6fff88;
  }

  .char-icon {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    cursor: grab;
    position: relative;
    flex-shrink: 0;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
    background: #2a2a2a;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .char-icon:hover { border-color: #fff; transform: scale(1.06); }
  .char-icon.dragging { opacity: 0.4; cursor: grabbing; }
  .char-icon .icon-img-wrap {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .char-icon .char-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.65);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    text-align: center;
    padding: 2px 0;
    letter-spacing: 0.5px;
    pointer-events: none;
    font-family: 'Tobi', sans-serif;
  }
  .char-icon .remove-btn {
    position: absolute; top: 1px; right: 1px;
    width: 16px; height: 16px;
    background: rgba(0,0,0,0.75);
    border: none; border-radius: 50%;
    color: #fff; font-size: 10px;
    line-height: 16px; text-align: center;
    cursor: pointer; display: none; padding: 0;
    z-index: 10;
  }
  .char-icon:hover .remove-btn { display: block; }

  /* Hide × on icons placed into tier rows (fixes sticky hover on mobile after drop) */
  .tier-content .char-icon .remove-btn { display: none !important; }
  /* Touch devices: never show × via hover (sticky after touch) */
  @media (hover: none) {
    .char-icon .remove-btn { display: none !important; }
  }
  /* While exporting to image, hide all × buttons regardless of device */
  body.exporting .char-icon .remove-btn { display: none !important; }
  /* Force desktop-like layout for the captured area during export */
  body.exporting #captureArea {
    width: 900px !important;
    max-width: none !important;
  }

  .upload-section {
    max-width: 900px;
    margin: 0 auto;
  }
  .upload-section h2 {
    font-size: 1rem; font-weight: 700;
    color: #aaa; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .upload-drop-zone {
    border: 2px dashed #555; border-radius: 10px;
    padding: 20px; text-align: center; color: #777;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    margin-bottom: 14px;
  }
  .upload-drop-zone:hover, .upload-drop-zone.dragover {
    border-color: #6db8f0; background: #202830; color: #aac8e8;
  }
  .upload-drop-zone input[type=file] { display: none; }
  .upload-drop-zone .upload-icon { font-size: 2.2rem; margin-bottom: 8px; }
  .upload-drop-zone p { font-size: 0.9rem; }
  .upload-drop-zone span { font-size: 0.78rem; color: #555; }

  .pool {
    display: flex; flex-wrap: wrap; gap: 8px;
    min-height: 80px; background: #1e1e1e;
    border: 2px solid #333; border-radius: 8px;
    padding: 10px; transition: background 0.15s;
  }
  .pool.drag-over { background: #272727; border-color: #555; }
  .pool-empty {
    color: #444; font-size: 0.85rem;
    align-self: center; margin: auto;
    pointer-events: none; user-select: none;
  }

  .actions {
    max-width: 900px; margin: 0 auto 16px;
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .btn {
    padding: 8px 18px; border-radius: 6px;
    font-size: 0.85rem; font-weight: 700;
    cursor: pointer; border: none; transition: opacity 0.15s;
    font-family: 'Tobi', sans-serif;
  }
  .btn:hover { opacity: 0.85; }
  .btn-clear { background: #3a2020; color: #e06060; }
  .btn-save  { background: #1e3a28; color: #60e090; }

  #captureArea {
    background: #1a1a1a;
    padding-bottom: 4px;
  }

</style>
</head>

<script>
let draggedEl = null;

const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const pool      = document.getElementById('pool');
const poolEmpty = document.getElementById('poolEmpty');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => addFiles(fileInput.files));

// Перетворює назву файлу типа "BuddyIcon.webp" в "Buddy"
function cleanIconName(filename) {
  // прибираємо розширення (.webp, .png, .jpg тощо)
  let name = filename.replace(/\.[a-z0-9]+$/i, '');
  // прибираємо слово "icon"/"icons" в кінці назви (з пробілом, дефісом чи підкресленням або без)
  name = name.replace(/[\s_-]*icons?$/i, '');
  name = name.trim();
  // якщо після чистки нічого не залишилось — повертаємо назву без розширення
  if (!name) {
    name = filename.replace(/\.[a-z0-9]+$/i, '');
  }
  return name;
}

function addFiles(files) {
  [...files].forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = ev => {
      pool.appendChild(createIcon(ev.target.result, cleanIconName(f.name)));
      poolEmpty.style.display = 'none';
    };
    reader.readAsDataURL(f);
  });
}

function createIcon(src, name) {
  const wrap = document.createElement('div');
  wrap.className = 'char-icon';
  wrap.draggable = true;
  wrap.title = name || '';

  const imgWrap = document.createElement('div');
  imgWrap.className = 'icon-img-wrap';
  const img = document.createElement('img');
  img.src = src;
  img.alt = name || '';
  img.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block;';
  imgWrap.appendChild(img);

  const label = document.createElement('div');
  label.className = 'char-name';
  label.textContent = name || '';

  const btn = document.createElement('button');
  btn.className = 'remove-btn';
  btn.textContent = '✕';
  btn.title = 'Удалить';
  btn.addEventListener('click', e => { e.stopPropagation(); wrap.remove(); updatePoolEmpty(); });

  wrap.appendChild(imgWrap); wrap.appendChild(label); wrap.appendChild(btn);

  wrap.addEventListener('dragstart', e => {
    draggedEl = wrap;
    setTimeout(() => wrap.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  wrap.addEventListener('dragend', () => {
    wrap.classList.remove('dragging');
    draggedEl = null;
    removePlaceholder();
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    updatePoolEmpty();
  });

  return wrap;
}

// Знаходить елемент після якого вставити при drag
function getDragAfterElement(container, x, y) {
  const draggables = [...container.querySelectorAll('.char-icon:not(.dragging)')];
  return draggables.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    // центр іконки
    const offsetX = x - (box.left + box.width / 2);
    const offsetY = y - (box.top + box.height / 2);
    // відстань з перевагою по горизонталі (ряди)
    const offset = offsetX + offsetY * 0.3;
    if (offset < 0 && offset > closest.offset) {
      return { offset, element: child };
    }
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

let placeholder = null;

function removePlaceholder() {
  if (placeholder && placeholder.parentNode) {
    placeholder.parentNode.removeChild(placeholder);
  }
  placeholder = null;
}

function getOrCreatePlaceholder() {
  if (!placeholder) {
    placeholder = document.createElement('div');
    placeholder.className = 'drop-placeholder';
  }
  return placeholder;
}

function setupDropTarget(el) {
  el.addEventListener('dragover', e => {
    e.preventDefault();
    el.classList.add('drag-over');
    const ph = getOrCreatePlaceholder();
    const afterEl = getDragAfterElement(el, e.clientX, e.clientY);
    if (afterEl == null) {
      el.appendChild(ph);
    } else {
      el.insertBefore(ph, afterEl);
    }
  });
  el.addEventListener('dragleave', e => {
    // перевіряємо що виходимо за межі контейнера, а не в дочірній елемент
    if (!el.contains(e.relatedTarget)) {
      el.classList.remove('drag-over');
    }
  });
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    if (draggedEl) {
      const ph = getOrCreatePlaceholder();
      if (ph.parentNode === el) {
        el.insertBefore(draggedEl, ph);
      } else {
        const afterEl = getDragAfterElement(el, e.clientX, e.clientY);
        if (afterEl == null) {
          el.appendChild(draggedEl);
        } else {
          el.insertBefore(draggedEl, afterEl);
        }
      }
      removePlaceholder();
      updatePoolEmpty();
    }
  });
}

document.querySelectorAll('.tier-content').forEach(setupDropTarget);
setupDropTarget(pool);

function updatePoolEmpty() {
  poolEmpty.style.display = pool.querySelectorAll('.char-icon').length > 0 ? 'none' : 'block';
}

function clearAll() {
  if (!confirm('Перенести все иконки обратно в банк?')) return;
  document.querySelectorAll('.tier-content .char-icon').forEach(ic => pool.appendChild(ic));
  updatePoolEmpty();
}
