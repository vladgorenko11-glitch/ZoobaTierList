  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    color: #fff;
    font-family: 'Tobi', 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }

  .site-header {
    max-width: 900px;
    margin: 0 auto 24px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 12px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .site-logo {
    height: 88px;
    width: auto;
    max-width: 100%;
    object-fit: contain;
    display: block;
  }

  h1 {
    text-align: center;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: 1px;
    margin-bottom: 6px;
    color: #ffffff;
  }

  .bank-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .bank-tab {
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #888;
    background: #1e1e1e;
    border: 2px solid #333;
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .bank-tab:hover { color: #ccc; border-color: #555; }
  .bank-tab.active {
    color: #1a1a1a;
    background: #6db8f0;
    border-color: #6db8f0;
  }

  .subtitle {
    text-align: center;
    color: #6db8f0;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .tier-table {
    width: 100%;
    max-width: 900px;
    margin: 0 auto 28px;
    border: 2px solid #333;
    border-radius: 6px;
    overflow: hidden;
  }

  .tier-row {
    display: flex;
    min-height: 80px;
    border-bottom: 2px solid #2c2c2c;
  }
  .tier-row:last-child { border-bottom: none; }

  .tier-label {
    width: 200px;
    min-width: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 1.35rem;
    letter-spacing: 1px;
    color: #1a1a1a;
    text-shadow: none;
    user-select: none;
    flex-shrink: 0;
    text-align: center;
    padding: 10px;
    line-height: 1.2;
  }

  .tier-S .tier-label { background: #e05252; color: #1a1a1a; }
  .tier-A .tier-label { background: linear-gradient(160deg, #e07832 0%, #e0a028 100%); color: #1a1a1a; }
  .tier-B .tier-label { background: #e0c832; color: #1a1a1a; }
  .tier-C .tier-label { background: #44c878; color: #1a1a1a; }
  .tier-D .tier-label { background: #48b8d0; color: #1a1a1a; }

  .tier-S { min-height: 90px; }
  .tier-A { min-height: 200px; }

  body.mode-items .tier-A { min-height: 80px; }
  @media (max-width: 600px) {
    body.mode-items .tier-row.tier-A { min-height: 80px; }
  }

  .tier-B { min-height: 80px; }
  .tier-C { min-height: 60px; }
  .tier-D { min-height: 80px; }

  .tier-content {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 6px;
    padding: 8px;
    background: #252525;
    min-height: inherit;
    transition: background 0.15s;
  }
  .tier-content.drag-over {
    background: #303030;
    outline: 2px dashed #666;
    outline-offset: -4px;
  }

    .drop-placeholder {
    width: 4px;
    height: 80px;
    background: #7c6fff;
    border-radius: 4px;
    flex-shrink: 0;
    pointer-events: none;
    box-shadow: 0 0 8px #7c6fff88;
  }

  .char-icon {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    cursor: grab;
    position: relative;
    flex-shrink: 0;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
    background: #2a2a2a;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .char-icon:hover { border-color: #fff; transform: scale(1.06); }
  .char-icon.dragging { opacity: 0.4; cursor: grabbing; }
  .char-icon .icon-img-wrap {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .char-icon .icon-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .char-icon .char-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.65);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    text-align: center;
    padding: 2px 0;
    letter-spacing: 0.5px;
    pointer-events: none;
    font-family: 'Tobi', sans-serif;
  }
  .char-icon .remove-btn {
    position: absolute; top: 1px; right: 1px;
    width: 16px; height: 16px;
    background: rgba(0,0,0,0.75);
    border: none; border-radius: 50%;
    color: #fff; font-size: 10px;
    line-height: 16px; text-align: center;
    cursor: pointer; display: none; padding: 0;
    z-index: 10;
  }
  .char-icon:hover .remove-btn { display: block; }

  .upload-section {
    max-width: 900px;
    margin: 0 auto;
  }
  .upload-section h2 {
    font-size: 1rem; font-weight: 700;
    color: #aaa; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .upload-drop-zone {
    border: 2px dashed #555; border-radius: 10px;
    padding: 20px; text-align: center; color: #777;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    margin-bottom: 14px;
  }
  .upload-drop-zone:hover, .upload-drop-zone.dragover {
    border-color: #6db8f0; background: #202830; color: #aac8e8;
  }
  .upload-drop-zone input[type=file] { display: none; }
  .upload-drop-zone .upload-icon { font-size: 2.2rem; margin-bottom: 8px; }
  .upload-drop-zone p { font-size: 0.9rem; }
  .upload-drop-zone span { font-size: 0.78rem; color: #555; }

  .pool {
    display: flex; flex-wrap: wrap; gap: 8px;
    min-height: 80px; background: #1e1e1e;
    border: 2px solid #333; border-radius: 8px;
    padding: 10px; transition: background 0.15s;
  }
  .pool.drag-over { background: #272727; border-color: #555; }
  .pool-empty {
    color: #444; font-size: 0.85rem;
    align-self: center; margin: auto;
    pointer-events: none; user-select: none;
  }

  .actions {
    max-width: 900px; margin: 0 auto 16px;
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .btn {
    padding: 8px 18px; border-radius: 6px;
    font-size: 0.85rem; font-weight: 700;
    cursor: pointer; border: none; transition: opacity 0.15s;
    font-family: 'Tobi', sans-serif;
  }
  .btn:hover { opacity: 0.85; }
  .btn-clear { background: #3a2020; color: #e06060; }
  .btn-save  { background: #1e3a28; color: #60e090; }

  #captureArea {
    background: #1a1a1a;
    padding-bottom: 4px;
  }

  /* Плаваюча копія іконки, що слідує за пальцем при сенсорному перетягуванні */
  .char-icon.touch-clone {
    position: fixed;
    width: 80px;
    height: 80px;
    margin: 0;
    transform: translate(-50%, -50%) scale(1.1);
    pointer-events: none;
    z-index: 9999;
    opacity: 0.9;
    border-color: #fff;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    cursor: grabbing;
  }
  .char-icon.touch-clone .remove-btn { display: none; }

  /* ---------- Мобільна версія ---------- */
  @media (max-width: 640px) {
    body { padding: 14px 8px 32px; }
    .subtitle { margin-bottom: 16px; }

    .tier-table { border-radius: 6px; margin-bottom: 20px; }

    .tier-label {
      width: 84px;
      min-width: 84px;
      font-size: 0.82rem;
      letter-spacing: 0;
      padding: 6px 4px;
    }

    .tier-row, .tier-S, .tier-A, .tier-B, .tier-C, .tier-D {
      min-height: 72px;
    }

    .char-icon,
    .char-icon .icon-img-wrap {
      width: 60px;
      height: 60px;
    }
    .char-icon.touch-clone {
      width: 60px;
      height: 60px;
    }
    .drop-placeholder { height: 60px; }

    .char-icon .remove-btn {
      display: block;
      width: 18px; height: 18px;
      line-height: 18px; font-size: 11px;
    }
    .char-icon:hover { transform: none; }

    .tier-content { gap: 5px; padding: 6px; }

    .actions {
      flex-direction: column;
      gap: 8px;
    }
    .btn { width: 100%; padding: 12px; font-size: 0.95rem; }

    .upload-drop-zone { padding: 16px; }
    .pool { gap: 6px; }

    .site-header { padding: 8px 12px; margin-bottom: 16px; }
    .site-logo { height: 56px; }

    .bank-tabs { gap: 6px; }
    .bank-tab { flex: 1; padding: 8px 6px; font-size: 0.82rem; letter-spacing: 0; }
  }

</style>
</head>

<script>
let draggedEl = null;

const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const pool      = document.getElementById('pool');
const poolEmpty = document.getElementById('poolEmpty');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => addFiles(fileInput.files));

// Перетворює назву файлу типа "BuddyIcon.webp" в "Buddy"
function cleanIconName(filename) {
  // прибираємо розширення (.webp, .png, .jpg тощо)
  let name = filename.replace(/\.[a-z0-9]+$/i, '');
  // прибираємо слово "icon"/"icons" в кінці назви (з пробілом, дефісом чи підкресленням або без)
  name = name.replace(/[\s_-]*icons?$/i, '');
  name = name.trim();
  // якщо після чистки нічого не залишилось — повертаємо назву без розширення
  if (!name) {
    name = filename.replace(/\.[a-z0-9]+$/i, '');
  }
  return name;
}

function addFiles(files) {
  [...files].forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = ev => {
      pool.appendChild(createIcon(ev.target.result, cleanIconName(f.name)));
      poolEmpty.style.display = 'none';
    };
    reader.readAsDataURL(f);
  });
}

function createIcon(src, name) {
  const wrap = document.createElement('div');
  wrap.className = 'char-icon';
  wrap.draggable = true;
  wrap.title = name || '';

  const imgWrap = document.createElement('div');
  imgWrap.className = 'icon-img-wrap';
  const img = document.createElement('img');
  img.alt = name || '';
  img.draggable = false;
  img.src = src;
  imgWrap.appendChild(img);

  const label = document.createElement('div');
  label.className = 'char-name';
  label.textContent = name || '';

  const btn = document.createElement('button');
  btn.className = 'remove-btn';
  btn.textContent = '✕';
  btn.title = 'Удалить';
  btn.addEventListener('click', e => { e.stopPropagation(); wrap.remove(); updatePoolEmpty(); });

  wrap.appendChild(imgWrap); wrap.appendChild(label); wrap.appendChild(btn);

  wrap.addEventListener('dragstart', e => {
    draggedEl = wrap;
    setTimeout(() => wrap.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  wrap.addEventListener('dragend', () => {
    wrap.classList.remove('dragging');
    draggedEl = null;
    removePlaceholder();
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    updatePoolEmpty();
  });

  // ---- Підтримка перетягування на сенсорних екранах (мобільні/планшети) ----
  let tStartX = 0, tStartY = 0, tActive = false, tClone = null;

  wrap.addEventListener('touchstart', e => {
    if (e.target.closest('.remove-btn')) return;
    const t = e.touches[0];
    tStartX = t.clientX; tStartY = t.clientY;
    tActive = false;
    draggedEl = wrap;
  }, { passive: true });

  wrap.addEventListener('touchmove', e => {
    if (draggedEl !== wrap) return;
    const t = e.touches[0];
    const dx = t.clientX - tStartX;
    const dy = t.clientY - tStartY;

    // Поки палець не зрушив достатньо — не починаємо drag (щоб працював скрол)
    if (!tActive) {
      if (Math.hypot(dx, dy) < 10) return;
      tActive = true;
      wrap.classList.add('dragging');
      tClone = wrap.cloneNode(true);
      tClone.classList.remove('dragging');
      tClone.classList.add('touch-clone');
      document.body.appendChild(tClone);
    }

    e.preventDefault(); // блокуємо скрол під час перетягування

    tClone.style.left = t.clientX + 'px';
    tClone.style.top = t.clientY + 'px';

    // Знаходимо контейнер під пальцем (тимчасово ховаємо клон)
    tClone.style.display = 'none';
    const below = document.elementFromPoint(t.clientX, t.clientY);
    tClone.style.display = '';
    const target = below && below.closest('.tier-content, .pool');

    document.querySelectorAll('.drag-over').forEach(el => {
      if (el !== target) el.classList.remove('drag-over');
    });

    if (target) {
      target.classList.add('drag-over');
      const ph = getOrCreatePlaceholder();
      const afterEl = getDragAfterElement(target, t.clientX, t.clientY);
      if (afterEl == null) {
        if (target.lastElementChild !== ph) target.appendChild(ph);
      } else if (ph.nextSibling !== afterEl) {
        target.insertBefore(ph, afterEl);
      }
    } else {
      removePlaceholder();
    }
  }, { passive: false });

  const endTouch = () => {
    if (draggedEl !== wrap) return;
    if (tActive) {
      const ph = getOrCreatePlaceholder();
      if (ph.parentNode) ph.parentNode.insertBefore(draggedEl, ph);
      if (tClone) { tClone.remove(); tClone = null; }
      wrap.classList.remove('dragging');
      removePlaceholder();
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      updatePoolEmpty();
    }
    draggedEl = null;
    tActive = false;
  };
  wrap.addEventListener('touchend', endTouch);
  wrap.addEventListener('touchcancel', endTouch);

  return wrap;
}

// Знаходить елемент перед яким вставити при drag (з урахуванням рядів)
function getDragAfterElement(container, x, y) {
  const draggables = [...container.querySelectorAll('.char-icon:not(.dragging)')];
  if (draggables.length === 0) return null;

  let closest = null;
  let closestDist = Infinity;
  let insertBefore = null;

  for (const child of draggables) {
    const box = child.getBoundingClientRect();
    const cx = box.left + box.width / 2;
    const cy = box.top + box.height / 2;
    // Вертикальна відстань має більшу вагу, щоб правильно визначати ряд
    const dx = x - cx;
    const dy = y - cy;
    const dist = Math.sqrt(dx * dx + (dy * 3) * (dy * 3));
    if (dist < closestDist) {
      closestDist = dist;
      closest = child;
      // якщо курсор лівіше центру найближчої іконки — вставляємо перед нею,
      // інакше — після неї
      insertBefore = x < cx ? child : child.nextElementSibling;
    }
  }

  // нормалізуємо: пропускаємо placeholder, якщо він став наступним
  if (insertBefore && insertBefore.classList && insertBefore.classList.contains('drop-placeholder')) {
    insertBefore = insertBefore.nextElementSibling;
  }
  return insertBefore || null;
}

let placeholder = null;

function removePlaceholder() {
  if (placeholder && placeholder.parentNode) {
    placeholder.parentNode.removeChild(placeholder);
  }
  placeholder = null;
}

function getOrCreatePlaceholder() {
  if (!placeholder) {
    placeholder = document.createElement('div');
    placeholder.className = 'drop-placeholder';
  }
  return placeholder;
}

function setupDropTarget(el) {
  el.addEventListener('dragover', e => {
    e.preventDefault();
    el.classList.add('drag-over');
    const ph = getOrCreatePlaceholder();
    const afterEl = getDragAfterElement(el, e.clientX, e.clientY);
    // Уникаємо зайвих переміщень DOM (через них було смикання)
    if (afterEl == null) {
      if (el.lastElementChild !== ph) el.appendChild(ph);
    } else if (ph.nextSibling !== afterEl) {
      el.insertBefore(ph, afterEl);
    }
  });
  el.addEventListener('dragleave', e => {
    // перевіряємо що виходимо за межі контейнера, а не в дочірній елемент
    if (!el.contains(e.relatedTarget)) {
      el.classList.remove('drag-over');
    }
  });
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    if (draggedEl) {
      const ph = getOrCreatePlaceholder();
      if (ph.parentNode === el) {
        el.insertBefore(draggedEl, ph);
      } else {
        const afterEl = getDragAfterElement(el, e.clientX, e.clientY);
        if (afterEl == null) {
          el.appendChild(draggedEl);
        } else {
          el.insertBefore(draggedEl, afterEl);
        }
      }
      removePlaceholder();
      updatePoolEmpty();
    }
  });
}

document.querySelectorAll('.tier-content').forEach(setupDropTarget);
setupDropTarget(pool);

function updatePoolEmpty() {
  poolEmpty.style.display = pool.querySelectorAll('.char-icon').length > 0 ? 'none' : 'block';
}

function clearAll() {
  if (!confirm('Перенести все иконки обратно в банк?')) return;
  document.querySelectorAll('.tier-content .char-icon').forEach(ic => pool.appendChild(ic));
  updatePoolEmpty();
}

/* ---------- Перемикання режимів: персонажи / предметы ---------- */
let currentMode = 'chars';
// Зберігає від'єднані іконки для неактивного режиму разом з їх місцем розташування
const bankStore = { chars: [], items: [] };

const MODE_TEXT = {
  chars: { title: 'Тир-лист персонажей', empty: 'Загрузите иконки персонажей — они появятся здесь' },
  items: { title: 'Тир-лист предметов',  empty: 'Загрузите иконки предметов — они появятся здесь' }
};

// Зчитує поточне розташування всіх іконок (у банку чи в якому тирі)
function snapshotMode() {
  const arr = [];
  document.querySelectorAll('.char-icon').forEach(el => {
    const parent = el.parentElement;
    if (!parent) return;
    const where = parent.classList.contains('pool') ? 'pool' : parent.getAttribute('data-tier');
    arr.push({ el, where });
  });
  return arr;
}

// Повертає іконки збереженого режиму назад у DOM на їх місця
function restoreMode(list) {
  list.forEach(({ el, where }) => {
    if (where === 'pool') {
      pool.appendChild(el);
    } else {
      const tc = document.querySelector('.tier-content[data-tier="' + where + '"]');
      (tc || pool).appendChild(el);
    }
  });
}

function switchMode(mode) {
  if (mode === currentMode) return;

  // 1. Запам'ятовуємо поточне розташування і від'єднуємо іконки від DOM
  bankStore[currentMode] = snapshotMode();
  document.querySelectorAll('.char-icon').forEach(el => el.remove());

  // 2. Переходимо в новий режим і відновлюємо його іконки
  currentMode = mode;
  document.body.classList.toggle('mode-items', mode === 'items');
  document.body.classList.toggle('mode-chars', mode === 'chars');
  restoreMode(bankStore[mode]);

  // 3. Оновлюємо інтерфейс
  document.querySelectorAll('.bank-tab').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-mode') === mode);
  });
  const titleEl = document.getElementById('mainTitle');
  if (titleEl) titleEl.textContent = MODE_TEXT[mode].title;
  poolEmpty.textContent = MODE_TEXT[mode].empty;

  removePlaceholder();
  updatePoolEmpty();
}

        // Розмір водяного знака — 22% ширини канвасу
        const wmW = canvas.width * 0.22;
        const wmH = wmW * (wm.naturalHeight / wm.naturalWidth);
        // Позиція — правий нижній кут з відступом
        const margin = canvas.width * 0.02;
        const x = canvas.width - wmW - margin;
        const y = canvas.height - wmH - margin;
        ctx.globalAlpha = 0.45;
        ctx.drawImage(wm, x, y, wmW, wmH);
        ctx.globalAlpha = 1.0;

        const a = document.createElement('a');
        a.download = 'tierlist.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
        btn.textContent = '💾 Сохранить как изображение'; btn.disabled = false;
      };

        // якщо щось пішло не так — зберігаємо без водяного знака
        const a = document.createElement('a');

        a.click();
        btn.textContent = '💾 Сохранить как изображение'; btn.disabled = false;
      };

    });

// Auto-populate pool with character icons, and stash item icons in bankStore.items
window.addEventListener('DOMContentLoaded', () => {
  ICONS.forEach(icon => {
    pool.appendChild(createIcon(icon.src, icon.name));
  });
  ITEMS.forEach(icon => {
    const el = createIcon(icon.src, icon.name);
    bankStore.items.push({ el, where: 'pool' });
  });
  poolEmpty.style.display = 'none';
});
